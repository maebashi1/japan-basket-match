<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群馬県の社会人バスケ募集一覧 | JAPAN BASKET MATCH</title>
    <link rel="stylesheet" href="../style.css"> <link rel="stylesheet" href="gunma-style.css"> </head>
<body>

<header>
    <div class="header-container">
        <a href="/" class="logo">JAPAN BASKET MATCH</a>
        <span class="area-badge">群馬エリア</span>
    </div>
</header>

<main>
    <section class="local-hero">
        <h1>群馬県でバスケを楽しもう</h1>
        <p>前橋・高崎・太田など、県内各地のチームを掲載中</p>
    </section>

    <section class="filter-section">
        <h3>エリアで絞り込む</h3>
        <div class="filter-group">
            <button class="filter-btn">中毛（前橋・伊勢崎）</button>
            <button class="filter-btn">西毛（高崎・安中）</button>
            <button class="filter-btn">東毛（太田・桐生）</button>
            <button class="filter-btn">北毛（渋川・沼田）</button>
        </div>
        <div class="filter-group secondary">
            <span class="tag-label">こだわり：</span>
            <label><input type="checkbox"> 無料駐車場あり</label>
            <label><input type="checkbox"> 初心者歓迎</label>
            <label><input type="checkbox"> 大会出場中</label>
        </div>
    </section>

    <section class="team-grid">
        <article class="team-card">
            <div class="card-header">
                <span class="area-tag">中毛</span>
                <span class="status-on">メンバー募集中</span>
            </div>
            <h3>前橋バスケフェローズ</h3>
            <p class="info-line">📍 活動：前橋市内 体育館</p>
            <p class="info-line">🚗 <strong>無料駐車場：完備</strong></p>
            <p class="description">20〜40代まで幅広く活動しています。レベルは初級〜中級です！</p>
            <a href="details-sample.html" class="btn-more">詳細・連絡先を見る</a>
        </article>
    </section>
</main>

</body>
</html>
