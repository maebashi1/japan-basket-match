<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京都の社会人バスケ募集一覧 | JAPAN BASKET MATCH</title>
    <link rel="stylesheet" href="../style.css"> <link rel="stylesheet" href="tokyo-style.css"> </head>
<body>

<header>
    <div class="header-container">
        <a href="/" class="logo">JAPAN BASKET MATCH</a>
        <span class="area-badge-tokyo">東京エリア</span>
    </div>
</header>

<main>
    <section class="local-hero-tokyo">
        <h1>東京でバスケ仲間を見つけよう</h1>
        <p>23区から多摩まで、仕事帰りや週末に遊べるチームが多数</p>
    </section>

    <section class="filter-section">
        <h3>エリアで絞り込む</h3>
        <div class="filter-group">
            <button class="filter-btn">23区（新宿・渋谷・足立など）</button>
            <button class="filter-btn">多摩地域（立川・八王子など）</button>
        </div>
        <div class="filter-group secondary">
            <span class="tag-label">こだわり：</span>
            <label><input type="checkbox"> 駅から徒歩10分以内</label>
            <label><input type="checkbox"> 19時以降スタート</label>
            <label><input type="checkbox"> 女子メンバー・ミックス</label>
        </div>
    </section>

    <section class="team-grid">
        <article class="team-card">
            <div class="card-header">
                <span class="area-tag-tokyo">23区</span>
                <span class="status-on">メンバー募集中</span>
            </div>
            <h3>TOKYO SHIBUYA BALLERS</h3>
            <p class="info-line">📍 活動：渋谷区内 公共体育館</p>
            <p class="info-line">🚃 <strong>最寄駅から徒歩5分</strong></p>
            <p class="description">平日の仕事帰りに活動中！ブランクがある方も大歓迎です。</p>
            <a href="details-sample.html" class="btn-more-tokyo">詳細・応募する</a>
        </article>
    </section>
</main>

</body>
</html>
