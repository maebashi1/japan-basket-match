<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPAN BASKET MATCH | 全国社会人バスケ検索・メンバー募集</title>
    <link rel="stylesheet" href="style.css">
</head>　
<body>

<header>
    <div class="header-container">
        <h1 class="logo">JAPAN BASKET MATCH</h1>
        <nav>
            <a href="#" class="btn-post">チームを登録する（無料）</a>
        </nav>
    </div>
</header>

<main>
    <section class="main-visual">
        <div class="overlay">
            <h2>バスケで、地域を繋ぐ。</h2>
            <p class="sub-text">全国の社会人チーム・メンバー募集を簡単検索</p>
            
            <div class="map-container">
                <h3>エリアから探す</h3>
                
                <div class="map-flex">
                    <div class="map-wrapper">
                        <div class="japan-map-placeholder">
                            <div class="pref gunma active"><a href="/gunma/">群馬</a></div>
                            <div class="pref tokyo active"><a href="/tokyo/">東京</a></div>
                            <div class="pref kanagawa">神奈川</div>
                            <div class="pref saitama">埼玉</div>
                            <div class="pref chiba">千葉</div>
                            <div class="msg-soon">他エリア順次拡大中</div>
                        </div>
                    </div>

                    <div class="area-list">
                        <div class="area-box">
                            <h4>関東エリア</h4>
                            <ul>
                                <li><a href="/tokyo/" class="active-link">東京都（公開中）</a></li>
                                <li><a href="/gunma/" class="active-link">群馬県（公開中）</a></li>
                                <li><span>神奈川県（準備中）</span></li>
                                <li><span>埼玉県（準備中）</span></li>
                                <li><span>千葉県（準備中）</span></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <p class="map-note">※オレンジ色の地域から先行公開中です！</p>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 JAPAN BASKET MATCH</p>
</footer>

</body>
</html>
