<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 1000 1000" style="enable-background:new 0 0 1000 1000;" xml:space="preserve">
<style type="text/css">
	.st0{fill:#CCCCCC;stroke:#FFFFFF;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;} /* 準備中の地域 */
	.st1{fill:#FF8C00;stroke:#FFFFFF;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;cursor:pointer;} /* 公開中の地域（バスケオレンジ） */
	.st1:hover{fill:#FFD700;} /* ホバー時の色（ゴールド） */
</style>

<path class="st0" d="...（省略：他の都道府県の形が入ります）..."/> 

<a xlink:href="/gunma/">
    <path id="gunma" class="st1" d="...（省略：群馬県の形が入ります）..."/>
</a>

<a xlink:href="/tokyo/">
    <path id="tokyo" class="st1" d="...（省略：東京都の形が入ります）..."/>
</a>

</svg>
